name: Deploy Backend to AWS

on:
  push:
    branches: [main]
    paths:
      - 'icake-api/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./icake-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        run: |
          docker build -t 442147574987.dkr.ecr.sa-east-1.amazonaws.com/icake-backend:latest .
          docker push 442147574987.dkr.ecr.sa-east-1.amazonaws.com/icake-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region sa-east-1 | docker login --username AWS --password-stdin 442147574987.dkr.ecr.sa-east-1.amazonaws.com
            cd icake
            docker-compose pull
            docker-compose up -d